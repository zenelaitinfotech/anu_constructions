server.port=${PORT:8080}
app.base-url=${APP_BASE_URL:https://anu-constructions.onrender.com}


# Database Configuration (PostgreSQL in Production / H2 in Local Development)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:apexdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Admin Credentials
admin.username=admin
admin.password=admin123

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

